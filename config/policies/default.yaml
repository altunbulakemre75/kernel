# kernel — Default Decision Policy — DEMO/DEVELOPMENT ONLY
#
# Üretim deploymentinde bu dosya MUTLAKA saha operasyonu tarafından
# güncellenmeli. Üretim güvenlik sertifikaları ve operatör onayı olmadan
# ENGAGE kuralı etkinleştirilmemelidir.

rules:
  - rule_id: POL-1
    description: "Düşük anomali — sadece kayıt"
    when_threat_level: low
    requires_operator_approval: false
    action: log
    enabled: true

  - rule_id: POL-2
    description: "Orta anomali — operatör uyarısı"
    when_threat_level: medium
    requires_operator_approval: false
    action: alert
    enabled: true

  - rule_id: POL-3
    description: "Yüksek anomali + korumalı bölge — handoff"
    when_threat_level: high
    when_inside_zone: true
    requires_operator_approval: true
    action: handoff
    enabled: true

  - rule_id: POL-4
    description: "Yüksek anomali (korumalı bölge dışı) — alert"
    when_threat_level: high
    when_inside_zone: false
    requires_operator_approval: false
    action: alert
    enabled: true

  - rule_id: POL-5
    description: "Kritik anomali + korumalı bölge — engage (operatör onayı şart)"
    when_threat_level: critical
    when_inside_zone: true
    requires_operator_approval: true
    action: engage
    enabled: false  # Üretim dışı — varsayılan devre dışı

  - rule_id: POL-6
    description: "Kritik anomali (bölge dışı) — handoff"
    when_threat_level: critical
    when_inside_zone: false
    requires_operator_approval: true
    action: handoff
    enabled: true
